repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic==2.11.7
          - pydantic-settings==2.9.1
          - types-defusedxml==0.7.0.20260408
          - httpx==0.28.1
        args: [--config-file=pyproject.toml]
        files: ^src/
  - repo: local
    hooks:
      - id: pytest-pre-push
        name: pytest (pre-push, no browser)
        entry: python -m pytest -q -m "not browser and not live_reference"
        language: system
        pass_filenames: false
        stages: [pre-push]
