# Optional: wire via `logging.config.dictConfig` if you prefer YAML-driven logging.
version: 1
disable_existing_loggers: false
formatters:
  standard:
    format: "%(levelname)s %(name)s %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: INFO
root:
  level: INFO
  handlers: [console]
